<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <p>
            Name: <input type="text" placeholder="location"><br>
            Age: <input type="number" placeholder="age"><br>
            Email: <input type="email" placeholder="email"><br>
            Gender: <input type="radio" name="gender" value="1">Male
                    <input type="radio" name="gender" value="2">Female
                    <input type="radio" name="gender" value="3">Other<br>
            Qualification: <input type="checkbox" name="qualification" value="1">10 <sup>th</sup>
                        <input type="checkbox" name="qualification" value="2">12 <sup>th</sup>
                        <input type="checkbox" name="qualification" value="3">Graduation<br>
                        <input type="checkbox" name="qualification" value="4">Phd<br>
            password: <input type="password" placeholder="password"><br>
            Date: <input type="date"><br>
            Time: <input type="time"><br>
            Files: <input type="file"><br>
            <button type = "submit">Submit</button>
            

        </p>
    </form>
</body>
</html>
